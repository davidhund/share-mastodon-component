name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint with Biome
        run: npx biome check ./src

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if git diff --name-only | grep -E '^dist/'; then
            echo "Error: dist/ files are not up to date. Run 'npm run build' and commit the changes."
            exit 1
          fi
